<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mecha Heart</title>
    <link rel="stylesheet" href="src/styles.css?v=26" />
  </head>
  <body class="setup-mode">
    <main id="game-shell">
      <section id="stage-wrap">
        <canvas id="game" width="1280" height="720" aria-label="宇宙心戰隊戰場"></canvas>
        <div id="skill-bar">
          <div id="skill-buttons"></div>
        </div>
        <div id="briefing">
          <div class="title-content">
            <p class="kicker">機動兵器戰線指揮</p>
            <h1 class="title-logo" data-text="Mecha Heart">
              <span>Mecha</span>
              <span>Heart</span>
            </h1>
            <p>軌道戰場 Roguelike 小隊指揮</p>
          </div>
          <button id="start-btn" class="title-start">開始作戰</button>
        </div>
        <div id="formation" hidden>
          <div class="formation-shell">
            <header class="formation-head">
              <div>
                <p class="kicker">出擊前整備</p>
                <h2>隊伍編成</h2>
                <p>選擇 4 架機體出戰。點擊機體可查看武裝、定位、主動技和必殺技。</p>
              </div>
              <div class="formation-actions">
                <strong id="formation-count">已選 4/4</strong>
                <button id="formation-start">開始地圖</button>
              </div>
            </header>
            <div id="formation-slots" class="formation-slots" aria-label="出戰隊伍"></div>
            <section class="tutorial-panel" aria-label="新手操作教學">
              <img src="assets/tutorial-controls.png?v=3" alt="新手操作教學：揀機、拖線移動、指向目標、放技能" />
              <div class="tutorial-notes">
                <h3>新手教學</h3>
                <p>先編成 4 架機體。入場後拖拉機體落地圖下令，拖到敵人會攻擊，拖到友軍會補血或協助集火。</p>
                <p>下方每架機都有主動技和必殺；必殺能量滿後按右邊技能制發動。</p>
              </div>
            </section>
            <div class="formation-scroll">
              <section id="formation-list" class="formation-list" aria-label="可選機體"></section>
              <section id="intel" class="intel-panel"></section>
              <details class="database" open>
                <summary>機體設計資料庫</summary>
                <div class="database-art">
                  <figure>
                    <figcaption>玩家機體設計</figcaption>
                    <img src="assets/player-new-lineup.png?v=3" alt="Six redesigned player mobile suits" />
                  </figure>
                  <figure>
                    <figcaption>敵方機體設計</figcaption>
                    <img src="assets/enemy-variants.png?v=18" alt="Enemy original mobile suit sprite art" />
                  </figure>
                </div>
                <div id="database-list"></div>
              </details>
            </div>
          </div>
        </div>
        <div id="reward" hidden>
          <div>
            <p class="kicker">Boss 擊破</p>
            <h2>選擇一項強化</h2>
          </div>
          <div id="reward-options"></div>
        </div>
        <div id="result" hidden>
          <h2 id="result-title">作戰完成</h2>
          <div id="result-copy" class="result-copy">艦隊防線仍然健在。</div>
          <button id="restart-btn">再次出擊</button>
        </div>
      </section>
      <aside id="hud">
        <div class="hud-head">
          <p class="kicker">戰術艦橋介面</p>
          <h2>小隊狀態</h2>
        </div>
        <div id="cards"></div>
        <div class="panel score-panel">
          <div class="stat-row round-row"><span>回合</span><strong id="wave">1</strong></div>
          <div class="stat-row score-row"><span>分數</span><strong id="score">0</strong></div>
          <div class="stat-row"><span>最高記錄</span><strong id="best-score">0</strong></div>
          <div class="stat-row"><span>敵機</span><strong id="enemy-count">0</strong></div>
          <div class="stat-row"><span>指令</span><strong id="command">待命</strong></div>
        </div>
      </aside>
    </main>
    <script src="src/main.js?v=32"></script>
  </body>
</html>
